# .bito.yaml — generated by building-in-the-open plugin
# Edit freely. Re-run plugin setup to regenerate from defaults.

dialect: __DIALECT__
max_grade: __MAX_GRADE__
passive_max_percent: __PASSIVE_MAX__
tokenizer: claude

rules:
  - paths: [".handoffs/*.md"]
    checks:
      completeness:
        template: handoff
      tokens:
        budget: 2000

  - paths: ["__DOC_DIR__/decisions/*.md"]
    checks:
      completeness:
        template: adr
      readability:
        max_grade: 12.0

  - paths: ["__DOC_DIR__/designs/*.md"]
    checks:
      completeness:
        template: design-doc
      readability:
        max_grade: 12.0

  - paths: ["docs/**/*.md", "README.md"]
    checks:
      readability:
        max_grade: __MAX_GRADE__
      grammar:
        passive_max: __PASSIVE_MAX__
